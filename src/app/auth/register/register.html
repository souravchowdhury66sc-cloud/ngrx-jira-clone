<div class="auth-container">
  <div class="auth-card">
    <h2>Create Account</h2>


    <form class="auth-form" (ngSubmit)="onSubmit()" #registerForm="ngForm">
      <div class="form-field">
        <label for="name">Full Name</label>
        <input id="name" name="name" [(ngModel)]="name" required/>
      </div>

      <div class="form-field">
        <label for="email">Email</label>
        <input id="email" name="email" [(ngModel)]="email" required />
      </div>

        <div class="form-field">
        <label for="password">Password</label>
        <input id="password" name="password" [(ngModel)]="password" required />
      </div>

        <div *ngIf="error$ | async as error" class="auth-error">
        {{ error }}
      </div>

      <button class="auth-button"
        type="submit"
        [disabled]="!registerForm.valid || (isLoading$ | async)">
        {{ (isLoading$ | async) ? 'Creating account...' : 'Create Account' }}
      </button>

    </form>
    <div class="auto-switch-link">
      Already have an account?
      <a routerLink="/login">Login here</a>
    </div>
  </div>
</div>
